<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartGadgets Ultra</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f172a;
  color:white;
}

/* HEADER */
header {
  display:flex;
  justify-content:space-between;
  padding:15px 30px;
  background:#111;
}

.logo {color:#ff5733;font-size:20px;font-weight:bold;}
button {
  background:#ff5733;
  border:none;
  padding:8px 15px;
  color:white;
  border-radius:20px;
  cursor:pointer;
}

/* PRODUCTS */
.products {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
  padding:20px;
}
.card {
  background:#1c1c1c;
  padding:15px;
  width:200px;
  border-radius:10px;
  text-align:center;
}
.card img {width:100%;}

/* CART */
.cart {
  position:fixed;
  right:-300px;
  top:0;
  width:300px;
  height:100%;
  background:#222;
  padding:20px;
  transition:0.3s;
}
.cart.active {right:0;}

.qty {
  display:flex;
  justify-content:center;
  gap:5px;
}

/* CHECKOUT */
.checkout {
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  padding:20px;
}
</style>
</head>

<body>

<header>
<div class="logo">SmartGadgets</div>
<button onclick="toggleCart()">Cart</button>
</header>

<div class="products" id="products"></div>

<div class="cart" id="cartBox">
<h3>Your Cart</h3>
<div id="cartItems"></div>
<p>Total: $<span id="total">0</span></p>
<button onclick="checkout()">Checkout</button>
</div>

<div class="checkout" id="checkoutBox">
<h2>Checkout</h2>

<input id="name" placeholder="Name"><br><br>
<input id="address" placeholder="Address"><br><br>

<button onclick="placeOrder()">Place Order</button>
</div>

<script>
let products=[
{name:"Watch",price:50},
{name:"Earbuds",price:30},
{name:"Phone",price:200},
{name:"Speaker",price:60}
];

let cart=[];

function render(){
let html="";
products.forEach((p,i)=>{
html+=`
<div class="card">
<img src="https://via.placeholder.com/200">
<h3>${p.name}</h3>
<p>$${p.price}</p>
<button onclick="add(${i})">Add</button>
</div>`;
});
document.getElementById("products").innerHTML=html;
}
render();

function add(i){
let found=cart.find(item=>item.name===products[i].name);
if(found){
found.qty++;
}else{
cart.push({...products[i],qty:1});
}
update();
}

function update(){
let html="";
let total=0;

cart.forEach((p,i)=>{
total+=p.price*p.qty;
html+=`
<div>
${p.name} ($${p.price})
<div class="qty">
<button onclick="change(${i},-1)">-</button>
<span>${p.qty}</span>
<button onclick="change(${i},1)">+</button>
</div>
<button onclick="remove(${i})">Remove</button>
</div>`;
});

document.getElementById("cartItems").innerHTML=html;
document.getElementById("total").innerText=total;
}

function change(i,val){
cart[i].qty+=val;
if(cart[i].qty<=0) cart.splice(i,1);
update();
}

function remove(i){
cart.splice(i,1);
update();
}

function toggleCart(){
document.getElementById("cartBox").classList.toggle("active");
}

function checkout(){
document.getElementById("checkoutBox").style.display="block";
}

function placeOrder(){
let name=document.getElementById("name").value;
let address=document.getElementById("address").value;

let text="Order:\n";
cart.forEach(p=>{
text+=p.name+" x"+p.qty+"\n";
});

let url="https://wa.me/96891383634?text="+encodeURIComponent(text);
window.open(url);
}
</script>

</body>
</html>
