<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Gadgets Pro</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
}

header {
    text-align: center;
    padding: 20px;
    background: #111;
    font-size: 24px;
}

.hero {
    text-align: center;
    padding: 50px 20px;
}

.hero h1 {
    font-size: 40px;
}

button {
    background: #ff4b2b;
    border: none;
    padding: 10px 20px;
    color: white;
    border-radius: 20px;
    cursor: pointer;
}

.products {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
}

.product {
    background: rgba(255,255,255,0.05);
    padding: 20px;
    border-radius: 15px;
    width: 250px;
    text-align: center;
    transition: 0.3s;
}

.product:hover {
    transform: scale(1.05);
}

img {
    width: 100%;
    border-radius: 10px;
}

.cart {
    position: fixed;
    top: 10px;
    right: 10px;
    background: red;
    padding: 10px;
    border-radius: 50%;
}

</style>
</head>

<body>

<header>SmartGadgets 🚀</header>

<div class="cart" id="cart">0</div>

<section class="hero">
<h1>Upgrade Your Lifestyle</h1>
<p>Best Smart Gadgets Available</p>
</section>

<section class="products">

<div class="product">
<img src="https://images.unsplash.com/photo-1585386959984-a41552231658">
<h3>Smart Watch</h3>
<p>$49</p>
<button onclick="addToCart()">Add to Cart</button>
</div>

<div class="product">
<img src="https://images.unsplash.com/photo-1518444065439-e933c06ce9cd">
<h3>Wireless Earbuds</h3>
<p>$29</p>
<button onclick="addToCart()">Add to Cart</button>
</div>

<div class="product">
<img src="https://images.unsplash.com/photo-1580910051074-3eb694886505">
<h3>Smart Speaker</h3>
<p>$59</p>
<button onclick="addToCart()">Add to Cart</button>
</div>

</section>

<script>
let count = 0;
function addToCart(){
    count++;
    document.getElementById("cart").innerText = count;
}
</script>

</body>
</html>
