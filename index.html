<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartGadgets Store</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

header {
    padding: 20px;
    text-align: center;
    background: linear-gradient(45deg,#6366f1,#9333ea);
    font-size: 24px;
    font-weight: bold;
}

.hero {
    text-align: center;
    padding: 60px 20px;
}

.hero h1 {
    font-size: 40px;
}

.hero p {
    color: #cbd5e1;
}

.btn {
    background: #f43f5e;
    padding: 12px 25px;
    color: white;
    border: none;
    cursor: pointer;
    border-radius: 25px;
}

.products {
    display: flex;
    gap: 20px;
    padding: 40px;
    justify-content: center;
    flex-wrap: wrap;
}

.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 15px;
    width: 250px;
    text-align: center;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

.price {
    color: #f43f5e;
    font-size: 20px;
}

footer {
    text-align: center;
    padding: 20px;
    background: #020617;
}
</style>
</head>

<body>

<header>SmartGadgets 🚀</header>

<section class="hero">
<h1>Future of Smart Living</h1>
<p>Premium gadgets for your smart lifestyle</p>
<button class="btn">Shop Now</button>
</section>

<section class="products">

<div class="card">
<h3>Smart LED Bulb</h3>
<p class="price">$29</p>
<button class="btn">Add to Cart</button>
</div>

<div class="card">
<h3>Security Camera</h3>
<p class="price">$89</p>
<button class="btn">Add to Cart</button>
</div>

<div class="card">
<h3>Smart Thermostat</h3>
<p class="price">$149</p>
<button class="btn">Add to Cart</button>
</div>

</section>

<footer>
<p>© 2026 SmartGadgets Store</p>
</footer>

</body>
</html>
