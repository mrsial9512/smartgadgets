<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartGadgets Pro</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color: white;
}

header {
  display: flex;
  justify-content: space-between;
  padding: 15px 30px;
}

.logo { color: #ff5733; font-weight: bold; }

.hero {
  text-align: center;
  padding: 80px 20px;
}

.btn {
  background: #ff5733;
  padding: 10px 20px;
  border: none;
  border-radius: 20px;
  cursor: pointer;
  color: white;
}

.products {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
}

.card {
  background: rgba(255,255,255,0.1);
  margin: 15px;
  padding: 20px;
  border-radius: 15px;
  width: 200px;
  text-align: center;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
}

.cart-box {
  position: fixed;
  right: 10px;
  top: 70px;
  background: #111;
  padding: 15px;
  border-radius: 10px;
}

input {
  width: 90%;
  margin: 5px;
  padding: 5px;
}
</style>
</head>

<body>

<header>
  <div class="logo">SmartGadgets</div>
  <div>Cart: <span id="count">0</span></div>
</header>

<section class="hero">
  <h1>Upgrade Your Lifestyle</h1>
  <p>Premium Smart Products</p>
  <button class="btn">Shop Now</button>
</section>

<section class="products">

<div class="card">
  <h3>Smart Watch</h3>
  <p>$49</p>
  <button class="btn" onclick="addItem('Watch',49)">Add</button>
</div>

<div class="card">
  <h3>Earbuds</h3>
  <p>$29</p>
  <button class="btn" onclick="addItem('Earbuds',29)">Add</button>
</div>

<div class="card">
  <h3>Smart Phone</h3>
  <p>$199</p>
  <button class="btn" onclick="addItem('Phone',199)">Add</button>
</div>

</section>

<div class="cart-box">
  <h3>Your Cart</h3>
  <ul id="cart"></ul>
  <p>Total: $<span id="total">0</span></p>

  <h4>Checkout</h4>
  <input placeholder="Name" id="name"><br>
  <input placeholder="Address" id="address"><br>

  <button class="btn" onclick="order()">Order WhatsApp</button>
</div>

<script>
let total = 0;
let count = 0;

function addItem(name,price){
  let li = document.createElement("li");
  li.innerText = name + " - $" + price;
  document.getElementById("cart").appendChild(li);

  total += price;
  count++;

  document.getElementById("total").innerText = total;
  document.getElementById("count").innerText = count;
}

function order(){
  let name = document.getElementById("name").value;
  let address = document.getElementById("address").value;

  let msg = "Order from SmartGadgets:%0AName: "+name+"%0AAddress: "+address+"%0ATotal: $"+total;

  window.open("https://wa.me/96891383634?text="+msg);
}
</script>

</body>
</html>
