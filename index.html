<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TechNova Store - Premium Gadgets</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Poppins;background:#0f172a;color:#fff}

header{
display:flex;justify-content:space-between;align-items:center;
padding:20px 40px;background:#020617;position:sticky;top:0
}
.logo{font-size:24px;font-weight:700;color:#f97316}
.cart-btn{background:#f97316;padding:8px 15px;border-radius:20px;cursor:pointer}

.hero{
text-align:center;padding:100px 20px;
background:linear-gradient(to right,#020617,#1e293b)
}
.hero h1{font-size:48px;margin-bottom:10px}
.hero p{color:#94a3b8;margin-bottom:20px}
.btn{
background:#f97316;padding:12px 25px;border:none;border-radius:25px;
cursor:pointer;color:#fff
}

.products{
display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;padding:50px
}
.card{
background:#1e293b;padding:20px;border-radius:15px;text-align:center
}
.card img{width:100%;border-radius:10px}
.price{color:#f97316;margin:10px 0}

.cart{
position:fixed;right:0;top:0;width:300px;height:100%;
background:#020617;padding:20px;overflow:auto
}

input{
width:100%;padding:10px;margin-top:10px;border-radius:5px;border:none
}

footer{
text-align:center;padding:20px;background:#020617;margin-top:40px
}
</style>
</head>

<body>

<header>
<div class="logo">TechNova</div>
<div class="cart-btn" onclick="openCart()">Cart (<span id="count">0</span>)</div>
</header>

<section class="hero">
<h1>Upgrade Your Lifestyle</h1>
<p>Premium Smart Gadgets for Modern Life</p>
<button class="btn">Shop Now</button>
</section>

<section class="products" id="products"></section>

<div class="cart" id="cart">
<h2>Your Cart</h2>
<div id="cartItems"></div>
<h3>Total: $<span id="total">0</span></h3>

<input id="name" placeholder="Your Name">
<input id="address" placeholder="Your Address">

<button class="btn" onclick="orderWhatsApp()">Order via WhatsApp</button>
</div>

<footer>
<p>© 2026 TechNova Store</p>
</footer>

<script>
let products=[
{name:"Smart Watch",price:49,img:"https://images.unsplash.com/photo-1516574187841-cb9cc2ca948b"},
{name:"Wireless Earbuds",price:29,img:"https://images.unsplash.com/photo-1585386959984-a41552262c85"},
{name:"Smart Phone",price:199,img:"https://images.unsplash.com/photo-1511707171634-5f897ff02aa9"},
{name:"Bluetooth Speaker",price:60,img:"https://images.unsplash.com/photo-1583225276497-61dbe8d8e16c"},
{name:"Gaming Headset",price:80,img:"https://images.unsplash.com/photo-1580894908361-967195033215"},
{name:"Laptop",price:899,img:"https://images.unsplash.com/photo-1517336714731-489689fd1ca8"}
]

let cart=[]

function loadProducts(){
let html=""
products.forEach((p,i)=>{
html+=`
<div class="card">
<img src="${p.img}">
<h3>${p.name}</h3>
<p class="price">$${p.price}</p>
<button class="btn" onclick="addToCart(${i})">Add</button>
</div>`
})
document.getElementById("products").innerHTML=html
}
loadProducts()

function addToCart(i){
cart.push(products[i])
updateCart()
}

function updateCart(){
document.getElementById("count").innerText=cart.length
let items=""
let total=0

cart.forEach(p=>{
items+=`<p>${p.name} - $${p.price}</p>`
total+=p.price
})

document.getElementById("cartItems").innerHTML=items
document.getElementById("total").innerText=total
}

function openCart(){
document.getElementById("cart").style.display="block"
}

function orderWhatsApp(){
let name=document.getElementById("name").value
let address=document.getElementById("address").value

let text="Order:%0A"
cart.forEach(p=>{
text+=p.name+" - $"+p.price+"%0A"
})

text+="Name: "+name+"%0AAddress: "+address

window.open("https://wa.me/96891383634?text="+text)
}
</script>

</body>
</html>
