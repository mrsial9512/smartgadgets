<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Gadgets E-commerce</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
        header { background: #333; color: #fff; padding: 10px 0; display: flex; justify-content: space-between; align-items: center; }
        .menu { display: none; }
        @media (max-width: 600px) { .menu { display: block; } }
        .products { display: flex; flex-wrap: wrap; justify-content: space-around; margin: 20px; }
        .product { border: 1px solid #ccc; margin: 10px; padding: 10px; width: 30%; box-shadow: 0 0 10px rgba(0, 0, 0, 0.1); }
        .cart { position: fixed; right: 10px; top: 10px; }
        #checkout-form { display: none; }
    </style>
</head>
<body>
    <header>
        <div>Smart Gadgets</div>
        <button class="menu" onclick="toggleMenu()">Menu</button>
    </header>
    <main>
        <section class="products">
            <div class="product"><h3>Product 1</h3><p>$10.00</p><button onclick="addToCart('Product 1', 10)">Add to Cart</button></div>
            <div class="product"><h3>Product 2</h3><p>$20.00</p><button onclick="addToCart('Product 2', 20)">Add to Cart</button></div>
            <div class="product"><h3>Product 3</h3><p>$30.00</p><button onclick="addToCart('Product 3', 30)">Add to Cart</button></div>
        </section>
        <div class="cart">
            <h4>Shopping Cart</h4>
            <div id="cart-items"></div>
            <button onclick="showCheckout()">Checkout</button>
        </div>
        <div id="checkout-form">
            <h4>Checkout</h4>
            <form>
                <input type="text" placeholder="Name" required />
                <input type="email" placeholder="Email" required />
                <button type="submit">Place Order</button>
            </form>
        </div>
    </main>
    <script>
        let cart = [];
        function addToCart(product, price) {
            cart.push({ product, price });
            updateCartDisplay();
        }
        function updateCartDisplay() {
            const cartItems = document.getElementById('cart-items');
            cartItems.innerHTML = '';
            cart.forEach(item => {
                const div = document.createElement('div');
                div.textContent = `${item.product} - $${item.price}`;
                cartItems.appendChild(div);
            });
        }
        function showCheckout() {
            document.getElementById('checkout-form').style.display = 'block';
        }
        function toggleMenu() {
            // Code to toggle mobile menu
        }
    </script>
</body>
</html>
