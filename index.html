<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Gadgets Pro</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f2027;
  color:white;
}

/* NAVBAR */
nav {
  display:flex;
  justify-content:space-between;
  padding:15px 30px;
  background:#111;
}

nav h2 {color:#ff4b2b;}

/* HERO */
.hero {
  text-align:center;
  padding:40px;
}

/* PRODUCTS */
.products {
  display:flex;
  gap:20px;
  flex-wrap:wrap;
  justify-content:center;
}

.product {
  background:#1c1c1c;
  padding:20px;
  width:250px;
  border-radius:10px;
  text-align:center;
}

.product img {
  width:100%;
  border-radius:10px;
}

button {
  background:#ff4b2b;
  border:none;
  padding:10px;
  color:white;
  cursor:pointer;
  border-radius:20px;
}

/* CART */
.cart-box {
  position:fixed;
  right:0;
  top:0;
  width:300px;
  height:100%;
  background:#222;
  padding:20px;
  display:none;
}

.cart-box h3 {margin-top:0}

/* FOOTER */
footer {
  text-align:center;
  padding:20px;
  background:#111;
  margin-top:20px;
}
</style>
</head>

<body>

<nav>
<h2>SmartGadgets</h2>
<button onclick="toggleCart()">Cart (<span id="count">0</span>)</button>
</nav>

<div class="hero">
<h1>Upgrade Your Lifestyle</h1>
<p>Premium Smart Products</p>
</div>

<div class="products">

<div class="product">
<img src="https://images.unsplash.com/photo-1585386959984-a41552231658">
<h3>Smart Watch</h3>
<p>$49</p>
<button onclick="addToCart('Smart Watch')">Add</button>
</div>

<div class="product">
<img src="https://images.unsplash.com/photo-1518444065439-e933c06ce9cd">
<h3>Earbuds</h3>
<p>$29</p>
<button onclick="addToCart('Earbuds')">Add</button>
</div>

<div class="product">
<img src="https://images.unsplash.com/photo-1580910051074-3eb694886505">
<h3>Speaker</h3>
<p>$59</p>
<button onclick="addToCart('Speaker')">Add</button>
</div>

</div>

<!-- CART -->
<div class="cart-box" id="cartBox">
<h3>Your Cart</h3>
<ul id="items"></ul>

<h4>Checkout</h4>
<input placeholder="Name"><br><br>
<input placeholder="Address"><br><br>

<button onclick="order()">Order via WhatsApp</button>
</div>

<footer>
© 2026 Smart Gadgets Store
</footer>

<script>
let count=0;
let items=[];

function addToCart(name){
  count++;
  items.push(name);
  document.getElementById("count").innerText=count;

  let li=document.createElement("li");
  li.innerText=name;
  document.getElementById("items").appendChild(li);
}

function toggleCart(){
  let box=document.getElementById("cartBox");
  box.style.display = box.style.display === "block" ? "none" : "block";
}

function order(){
  let msg="Order:\\n"+items.join("\\n");
  window.open("https://wa.me/?text="+encodeURIComponent(msg));
}
</script>

</body>
</html>
