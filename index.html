<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartGadgets Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins}

body{
background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
}

/* NAVBAR */
nav{
display:flex;
justify-content:space-between;
padding:20px 50px;
background:rgba(0,0,0,0.5);
backdrop-filter:blur(10px);
}

nav h2{color:#ff4b2b}

/* HERO */
.hero{
text-align:center;
padding:80px 20px;
}

.hero h1{
font-size:50px;
background:linear-gradient(to right,#ff4b2b,#ff416c);
-webkit-background-clip:text;
color:transparent;
}

.hero p{
margin:20px 0;
opacity:0.8;
}

/* BUTTON */
.btn{
background:linear-gradient(45deg,#ff4b2b,#ff416c);
padding:12px 25px;
border:none;
border-radius:30px;
color:white;
cursor:pointer;
transition:0.3s;
}

.btn:hover{
transform:scale(1.1);
}

/* PRODUCTS */
.products{
display:flex;
justify-content:center;
gap:30px;
flex-wrap:wrap;
padding:40px;
}

.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);
padding:20px;
width:260px;
border-radius:20px;
text-align:center;
transition:0.4s;
}

.card:hover{
transform:translateY(-10px) scale(1.05);
}

.card img{
width:100%;
border-radius:15px;
}

.price{
color:#ff416c;
font-weight:bold;
margin:10px 0;
}

/* BADGE */
.badge{
position:absolute;
background:red;
padding:5px 10px;
border-radius:10px;
font-size:12px;
}

/* CART */
.cart{
position:fixed;
top:20px;
right:20px;
background:#ff4b2b;
padding:12px;
border-radius:50%;
}

/* FOOTER */
footer{
text-align:center;
padding:20px;
opacity:0.7;
}
</style>
</head>

<body>

<nav>
<h2>SmartGadgets</h2>
<div class="cart" id="cart">0</div>
</nav>

<section class="hero">
<h1>Future of Smart Living</h1>
<p>Experience Premium Technology</p>
<button class="btn">Shop Now</button>
</section>

<section class="products">

<div class="card">
<img src="https://images.unsplash.com/photo-1518444065439-e933c06ce9cd">
<h3>Wireless Earbuds</h3>
<p class="price">$29</p>
<button class="btn" onclick="add()">Add to Cart</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1585386959984-a41552231658">
<h3>Smart Watch</h3>
<p class="price">$49</p>
<button class="btn" onclick="add()">Add to Cart</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1580910051074-3eb694886505">
<h3>Smart Speaker</h3>
<p class="price">$59</p>
<button class="btn" onclick="add()">Add to Cart</button>
</div>

</section>

<footer>
© 2026 SmartGadgets | Premium Store
</footer>

<script>
let count=0;
function add(){
count++;
document.getElementById("cart").innerText=count;
}
</script>

</body>
</html>
